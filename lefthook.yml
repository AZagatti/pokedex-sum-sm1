pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,ts,svelte}"
      run: npx oxlint {staged_files}

    - name: oxfmt
      glob: "*.{js,ts,json,css,md}"
      run: npx oxfmt --check {staged_files}

    - name: typecheck
      run: npm run check

pre-push:
  commands:
    test:
      run: npm run test
